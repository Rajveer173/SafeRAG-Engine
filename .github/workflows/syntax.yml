name: Syntax Check

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  syntax:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies (syntax check only)
      run: |
        python -m pip install --upgrade pip
        pip install flake8
    
    - name: Syntax check with Flake8
      run: |
        flake8 src/ cli.py --count --select=E9,F63,F7,F82 --show-source --statistics || true
    
    - name: Python compile check
      run: |
        python -m py_compile src/rag/core/*.py
        python -m py_compile src/rag/api/*.py
        python -m py_compile src/rag/*.py
        python -m py_compile cli.py
        python -m py_compile config/*.py
